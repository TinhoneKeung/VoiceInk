name: Local Build (No License Required)

on:
  workflow_dispatch:  # 仅手动触发，省额度

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cmake
        run: brew install cmake

      - name: Switch to latest Xcode
        run: |
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app | tail -1)
          echo "Switching to $LATEST_XCODE"
          sudo xcode-select --switch "$LATEST_XCODE/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Build whisper.xcframework
        run: |
          make -j$(sysctl -n hw.logicalcpu) whisper DEPS_DIR="$PWD/VoiceInk-Dependencies"

      - name: Build VoiceInk (LOCAL_BUILD)
        run: |
          make local DEPS_DIR="$PWD/VoiceInk-Dependencies"

      - name: Package as DMG
        run: |
          APP_PATH=".local-build/Build/Products/Debug/VoiceInk.app"
          hdiutil create -volname VoiceInk -srcfolder "$APP_PATH" -ov VoiceInk-Local.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceInk-Local
          path: VoiceInk-Local.dmg
